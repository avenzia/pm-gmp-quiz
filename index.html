<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM팀을 위한 GMP Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- EmailJS for sending result emails -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<!-- SheetJS for XLSX export -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --navy:#0D1F3C; --navy2:#16325C; --blue:#1A5CBA; --blue2:#2270D8;
  --accent:#00C2CB; --accent2:#00A8B0;
  --success:#00B67A; --danger:#E53E3E;
  --white:#FFFFFF; --off:#F4F7FB; --gray:#8899AA; --gray2:#C8D4E0;
  --card:#FFFFFF; --border:rgba(26,92,186,0.13);
  --shadow:0 4px 28px rgba(13,31,60,0.10);
  --shadow2:0 2px 8px rgba(13,31,60,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Inter',sans-serif;background:var(--off);color:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* TOP BAR */
.topbar{width:100%;background:var(--navy);display:flex;align-items:center;padding:10px 20px;position:sticky;top:0;z-index:50;gap:8px;border-bottom:2px solid var(--blue);}
.topbar-logo{font-family:'Inter',sans-serif;font-size:13px;font-weight:800;color:var(--white);letter-spacing:2px;margin-right:auto;display:flex;align-items:center;gap:8px;}
.topbar-logo span{background:var(--accent);color:var(--navy);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:800;letter-spacing:1px;}
.hall-btn{padding:6px 14px;border-radius:6px;border:1.5px solid rgba(0,194,203,0.4);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer;letter-spacing:1px;transition:all 0.2s;margin-right:8px;}
.hall-btn:hover{background:var(--accent);color:var(--navy);}
.lang-btn{padding:6px 13px;border-radius:6px;border:1.5px solid rgba(255,255,255,0.2);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,0.7);cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
.lang-btn.active{background:var(--blue2);border-color:var(--blue2);color:var(--white);}
.lang-btn:hover:not(.active){border-color:rgba(255,255,255,0.5);color:var(--white);}

/* CONTAINER */
.container{width:100%;max-width:680px;padding:28px 20px 60px;}

/* SCREEN */
.screen{display:none;animation:fadeUp 0.4s ease;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* CARD */
.card{background:var(--card);border-radius:16px;padding:36px 32px;box-shadow:var(--shadow);border:1px solid var(--border);}

/* ── START SCREEN ── */
.start-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(26,92,186,0.08);border:1px solid rgba(26,92,186,0.2);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--blue);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
.start-title{font-family:'Inter',sans-serif;font-size:26px;font-weight:800;color:var(--navy);line-height:1.25;margin-bottom:6px;}
.start-title em{color:var(--blue2);font-style:normal;}
.start-sub{font-size:13px;color:var(--gray);letter-spacing:1px;margin-bottom:24px;font-weight:400;}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px;}
.info-box{background:var(--off);border-radius:10px;padding:14px 12px;text-align:center;border:1px solid var(--border);}
.info-box .val{font-family:'Inter',sans-serif;font-size:20px;font-weight:800;color:var(--blue2);}
.info-box .lbl{font-size:10px;color:var(--gray);letter-spacing:1px;margin-top:3px;text-transform:uppercase;}
.divider{height:1px;background:var(--border);margin:24px 0;}
.field-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--blue);margin-bottom:8px;text-transform:uppercase;}
.name-input{width:100%;padding:13px 16px;border:1.5px solid var(--gray2);border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:var(--navy);background:var(--white);outline:none;margin-bottom:20px;transition:border-color 0.2s;}
.name-input:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(26,92,186,0.10);}
.name-input::placeholder{color:var(--gray2);}
.count-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--blue);margin-bottom:12px;text-transform:uppercase;text-align:center;}
.count-buttons{display:flex;gap:10px;justify-content:center;margin-bottom:24px;}
.count-btn{flex:1;max-width:110px;padding:14px 8px;border:1.5px solid var(--gray2);background:var(--white);border-radius:10px;font-family:'Inter',sans-serif;font-size:22px;font-weight:800;color:var(--gray);cursor:pointer;transition:all 0.2s;text-align:center;}
.count-btn span{display:block;font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:500;color:var(--gray);margin-top:2px;letter-spacing:1px;}
.count-btn:hover,.count-btn.selected{border-color:var(--blue2);background:rgba(26,92,186,0.06);color:var(--blue2);transform:translateY(-2px);box-shadow:0 4px 14px rgba(26,92,186,0.12);}
.count-btn.selected span{color:var(--blue2);}
.start-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:var(--white);border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.25s;box-shadow:0 4px 18px rgba(26,92,186,0.30);}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,92,186,0.38);}
.start-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
.footer-note{text-align:center;font-size:11px;color:var(--gray);opacity:0.6;margin-top:20px;letter-spacing:1px;}

/* ── QUIZ SCREEN ── */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.quiz-progress-text{font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--blue);}
.quiz-score-text{font-size:12px;color:var(--gray);font-weight:500;}
.progress-bar{width:100%;height:5px;background:var(--gray2);border-radius:3px;margin-bottom:24px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:3px;transition:width 0.5s ease;}

/* Q type badges */
.type-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:2px;padding:4px 12px;border-radius:20px;margin-bottom:12px;text-transform:uppercase;}
.type-badge.ox{background:rgba(0,194,203,0.10);color:var(--accent2);border:1px solid rgba(0,194,203,0.25);}
.type-badge.mc{background:rgba(26,92,186,0.08);color:var(--blue2);border:1px solid rgba(26,92,186,0.2);}

.question-text{font-size:17px;font-weight:700;color:var(--navy);line-height:1.55;margin-bottom:22px;}

/* OX options */
.ox-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.ox-btn{padding:22px 10px;border:2px solid var(--gray2);background:var(--white);border-radius:12px;font-family:'Inter',sans-serif;font-size:28px;font-weight:800;color:var(--gray);cursor:pointer;transition:all 0.2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;}
.ox-btn span{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;}
.ox-btn:hover:not(:disabled){border-color:var(--blue2);background:rgba(26,92,186,0.04);transform:translateY(-2px);}
.ox-btn.selected{border-color:var(--blue2);background:rgba(26,92,186,0.07);color:var(--blue2);}
.ox-btn.correct{border-color:var(--success);background:rgba(0,182,122,0.08);color:var(--success);}
.ox-btn.wrong{border-color:var(--danger);background:rgba(229,62,62,0.07);color:var(--danger);}
.ox-btn:disabled{cursor:default;}

/* MC options */
.mc-grid{display:grid;grid-template-columns:1fr;gap:9px;margin-bottom:16px;}
.mc-btn{padding:14px 16px;border:1.5px solid var(--gray2);background:var(--white);border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--navy);cursor:pointer;transition:all 0.2s;text-align:left;line-height:1.4;display:flex;align-items:center;gap:12px;}
.mc-btn-num{width:26px;height:26px;border-radius:50%;background:var(--off);border:1.5px solid var(--gray2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gray);flex-shrink:0;transition:all 0.2s;}
.mc-btn:hover:not(:disabled){border-color:var(--blue2);background:rgba(26,92,186,0.04);}
.mc-btn:hover:not(:disabled) .mc-btn-num{background:var(--blue2);border-color:var(--blue2);color:var(--white);}
.mc-btn.selected{border-color:var(--blue2);background:rgba(26,92,186,0.06);}
.mc-btn.selected .mc-btn-num{background:var(--blue2);border-color:var(--blue2);color:var(--white);}
.mc-btn.correct{border-color:var(--success);background:rgba(0,182,122,0.07);}
.mc-btn.correct .mc-btn-num{background:var(--success);border-color:var(--success);color:var(--white);}
.mc-btn.wrong{border-color:var(--danger);background:rgba(229,62,62,0.06);}
.mc-btn.wrong .mc-btn-num{background:var(--danger);border-color:var(--danger);color:var(--white);}
.mc-btn:disabled{cursor:default;}

.check-btn{width:100%;padding:14px;background:var(--navy);color:var(--white);border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.2s;margin-bottom:12px;}
.check-btn:hover:not(:disabled){background:var(--navy2);transform:translateY(-1px);}
.check-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;}

.feedback-box{display:none;border-radius:12px;padding:16px 18px;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.feedback-box.correct-fb{background:rgba(0,182,122,0.08);border:1.5px solid rgba(0,182,122,0.25);}
.feedback-box.wrong-fb{background:rgba(229,62,62,0.06);border:1.5px solid rgba(229,62,62,0.2);}
.feedback-result{font-size:14px;font-weight:700;margin-bottom:7px;}
.correct-fb .feedback-result{color:var(--success);}
.wrong-fb .feedback-result{color:var(--danger);}
.feedback-explanation{font-size:12px;color:var(--navy);line-height:1.75;opacity:0.8;}
.next-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:var(--white);border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:12px;display:none;transition:all 0.2s;box-shadow:0 4px 14px rgba(26,92,186,0.25);}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,92,186,0.35);}

/* ── RESULT SCREEN ── */
.result-header{text-align:center;margin-bottom:24px;}
.result-emoji{font-size:48px;margin-bottom:10px;}
.result-title{font-family:'Inter',sans-serif;font-size:22px;font-weight:800;color:var(--navy);margin-bottom:4px;}
.result-sub{font-size:12px;color:var(--gray);letter-spacing:2px;}
.score-ring-wrap{display:flex;justify-content:center;margin:20px 0 24px;}
.score-ring{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--accent));display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(26,92,186,0.30);}
.score-num{font-family:'Inter',sans-serif;font-size:38px;font-weight:800;color:var(--white);line-height:1;}
.score-denom{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-box{background:var(--off);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border);}
.stat-val{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;color:var(--blue2);}
.stat-lbl{font-size:10px;color:var(--gray);letter-spacing:1px;margin-top:3px;text-transform:uppercase;}
.result-msg{text-align:center;font-size:13px;line-height:1.8;color:var(--navy);opacity:0.7;margin-bottom:20px;font-style:italic;}
.section-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--blue);margin-bottom:10px;text-align:center;text-transform:uppercase;}
.top10-list{margin-bottom:20px;}
.rank-row{display:flex;align-items:center;padding:9px 12px;border-radius:8px;margin-bottom:5px;background:var(--off);border:1px solid var(--border);}
.rank-row.me{background:rgba(26,92,186,0.07);border-color:rgba(26,92,186,0.2);}
.rank-num{font-family:'Inter',sans-serif;font-size:14px;font-weight:700;width:30px;color:var(--gray);}
.rank-num.gold{color:#D4A017;} .rank-num.silver{color:#8899AA;} .rank-num.bronze{color:#A0522D;}
.rank-name{flex:1;font-size:13px;color:var(--navy);}
.rank-score{font-size:13px;font-weight:700;color:var(--blue2);}
.retry-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:var(--white);border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.25s;box-shadow:0 4px 18px rgba(26,92,186,0.28);}
.retry-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,92,186,0.38);}

/* ── HALL OF FAME ── */
.hof-title-wrap{text-align:center;margin-bottom:24px;}
.hof-icon{font-size:36px;margin-bottom:8px;}
.hof-title{font-family:'Inter',sans-serif;font-size:22px;font-weight:800;color:var(--navy);margin-bottom:4px;}
.hof-sub{font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;}
.hof-table{width:100%;border-collapse:collapse;margin-bottom:24px;}
.hof-table th{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--blue);text-align:left;padding:9px 12px;border-bottom:2px solid rgba(26,92,186,0.15);text-transform:uppercase;}
.hof-table th:last-child{text-align:right;}
.hof-table td{padding:11px 12px;font-size:13px;color:var(--navy);border-bottom:1px solid var(--border);}
.hof-table td:last-child{text-align:right;font-weight:700;color:var(--blue2);}
.hof-table tr:hover td{background:rgba(26,92,186,0.03);}
.hof-rank-cell{font-family:'Inter',sans-serif;font-size:15px;font-weight:700;width:40px;}
.hof-back-btn{width:100%;padding:14px;background:var(--navy);color:var(--white);border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.2s;margin-bottom:10px;}
.hof-back-btn:hover{background:var(--navy2);transform:translateY(-1px);}
.hof-restart-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:var(--white);border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.2s;box-shadow:0 4px 14px rgba(26,92,186,0.25);}
.hof-restart-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,92,186,0.35);}
.download-btn{width:100%;padding:13px;background:var(--white);color:var(--accent2);border:1.5px solid var(--accent2);border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.2s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
.download-btn:hover{background:var(--accent2);color:var(--white);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,168,176,0.25);}
.download-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.email-status{font-size:11px;color:var(--gray);text-align:center;margin-top:8px;letter-spacing:0.5px;}
.email-status.success{color:var(--success);}
.email-status.error{color:var(--danger);}
.hof-loading{text-align:center;padding:36px;font-size:28px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}
.hof-empty{text-align:center;padding:36px;color:var(--gray);font-size:13px;line-height:1.8;}

/* SAVING */
.saving-overlay{display:none;position:fixed;inset:0;background:rgba(13,31,60,0.55);z-index:100;align-items:center;justify-content:center;}
.saving-overlay.show{display:flex;}
.saving-box{background:var(--white);border-radius:16px;padding:28px 36px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
.saving-spin{font-size:32px;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.saving-box p{font-size:14px;font-weight:700;color:var(--navy);margin-top:10px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <span>GMP</span> QUIZ
  </div>
  <button class="hall-btn" id="hall-btn" onclick="showHallOfFame()">🏆 명예의 전당</button>
  <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">한국어</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
</div>

<div class="container">

  <!-- START -->
  <div class="screen active" id="screen-start">
    <div class="card">
      <div class="start-badge" id="start-badge">📋 GMP Training Quiz</div>
      <h1 class="start-title" id="start-title">PM팀을 위한<br><em>GMP Quiz</em></h1>
      <p class="start-sub" id="start-sub">Receiving · Storage · Temperature · Distribution · Status Control</p>
      <div class="info-grid">
        <div class="info-box"><div class="val">30</div><div class="lbl" id="lbl-q">문제</div></div>
        <div class="info-box"><div class="val">O/X</div><div class="lbl" id="lbl-ox">+ 객관식</div></div>
        <div class="info-box"><div class="val">FDA</div><div class="lbl" id="lbl-fda">실사 기반</div></div>
      </div>
      <div class="divider"></div>
      <p class="field-label" id="label-name">참여자 이름</p>
      <input class="name-input" id="name-input" type="text" placeholder="이름을 입력하세요" oninput="onNameInput()">
      <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled id="start-btn">퀴즈 시작하기 →</button>
    </div>
    <p class="footer-note" id="footer-note">본 퀴즈는 PM팀 GMP 교육 목적으로 제작되었습니다</p>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="card">
      <div class="quiz-header">
        <span class="quiz-progress-text" id="progress-text">1 / 10</span>
        <span class="quiz-score-text" id="score-text">점수: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="type-badge" id="type-badge"></span>
      <p class="question-text" id="question-text"></p>
      <div id="options-area"></div>
      <button class="check-btn" id="check-btn" onclick="checkAnswer()" disabled>정답 확인</button>
      <div class="feedback-box" id="feedback-box">
        <p class="feedback-result" id="feedback-result"></p>
        <p class="feedback-explanation" id="feedback-explanation"></p>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="card">
      <div class="result-header">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">퀴즈 완료!</div>
        <div class="result-sub">QUIZ COMPLETE</div>
      </div>
      <div class="score-ring-wrap">
        <div class="score-ring">
          <div class="score-num" id="final-score">0</div>
          <div class="score-denom" id="final-total">/ 30 pts</div>
        </div>
      </div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-val" id="stat-correct">0</div><div class="stat-lbl" id="lbl-correct">정답</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-wrong">0</div><div class="stat-lbl" id="lbl-wrong">오답</div></div>
      </div>
      <p class="result-msg" id="result-msg"></p>
      <p class="section-title" id="top10-title">🏅 TOP 10 랭킹</p>

// ── HELPERS ───────────────────────────────────────────────────────
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildQuestions(n){
  const pool=shuffle([...QUESTIONS]);
  return pool.slice(0,Math.min(n,pool.length));
}

// ── START ─────────────────────────────────────────────────────────
window.onNameInput=function(){playerName=document.getElementById('name-input').value.trim();updateStartBtn();};
function updateStartBtn(){document.getElementById('start-btn').disabled=!playerName;}
window.startQuiz=function(){questions=buildQuestions(totalCount);current=0;score=0;showScreen('screen-quiz');loadQ();};

function showScreen(id){
  prevScreen=document.querySelector('.screen.active')?.id||'screen-start';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── QUIZ ──────────────────────────────────────────────────────────
function loadQ(){
  answered=false;
  const q=questions[current];
  document.getElementById('progress-text').textContent=`${current+1} / ${totalCount}`;
  document.getElementById('score-text').textContent=t(`점수: ${score}`,`Score: ${score}`);
  document.getElementById('progress-fill').style.width=`${(current/totalCount)*100}%`;
  document.getElementById('feedback-box').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('check-btn').disabled=true;
  renderQ();
}

function renderQ(){
  const q=questions[current];
  const badge=document.getElementById('type-badge');
  badge.className=`type-badge ${q.type}`;
  badge.textContent=q.type==='ox'?t('O / X 퀴즈','O / X Quiz'):t('📝 객관식','📝 Multiple Choice');
  document.getElementById('question-text').textContent=lang==='ko'?q.qko:q.qen;
  document.getElementById('check-btn').textContent=t('정답 확인','Check Answer');
  document.getElementById('score-text').textContent=t(`점수: ${score}`,`Score: ${score}`);
  renderOptions();
}

function renderOptions(){
  const q=questions[current];
  const area=document.getElementById('options-area');
  area.innerHTML='';

  if(q.type==='ox'){
    const grid=document.createElement('div'); grid.className='ox-grid';
    ['O','X'].forEach(val=>{
      const btn=document.createElement('button');
      btn.className='ox-btn'; btn.dataset.val=val;
      btn.innerHTML=`${val}<span>${val==='O'?t('맞다','True'):t('틀리다','False')}</span>`;
      btn.onclick=()=>selectOpt(btn);
      grid.appendChild(btn);
    });
    area.appendChild(grid);
  } else {
    const grid=document.createElement('div'); grid.className='mc-grid';
    const opts=lang==='ko'?q.options_ko:q.options_en;
    opts.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='mc-btn'; btn.dataset.index=i;
      btn.innerHTML=`<span class="mc-btn-num">${String.fromCharCode(65+i)}</span>${opt}`;
      btn.onclick=()=>selectOpt(btn);
      grid.appendChild(btn);
    });
    area.appendChild(grid);
  }
}

function selectOpt(clickedBtn){
  if(answered)return;
  document.querySelectorAll('.ox-btn,.mc-btn').forEach(b=>b.classList.remove('selected'));
  clickedBtn.classList.add('selected');
  document.getElementById('check-btn').disabled=false;
}

window.checkAnswer=function(){
  if(answered)return; answered=true;
  const q=questions[current];
  let ok=false;

  if(q.type==='ox'){
    const sel=document.querySelector('.ox-btn.selected');
    const chosen=sel?sel.dataset.val:'';
    ok=chosen===q.answer;
    document.querySelectorAll('.ox-btn').forEach(btn=>{
      btn.disabled=true;
      if(btn.dataset.val===q.answer) btn.classList.add('correct');
      else if(btn.dataset.val===chosen&&!ok) btn.classList.add('wrong');
    });
  } else {
    const sel=document.querySelector('.mc-btn.selected');
    const idx=sel?parseInt(sel.dataset.index):-1;
    ok=idx===q.answer;
    document.querySelectorAll('.mc-btn').forEach((btn,i)=>{
      btn.disabled=true;
      if(i===q.answer) btn.classList.add('correct');
      else if(i===idx&&!ok) btn.classList.add('wrong');
    });
  }

  lastAnswerOk=ok;
  if(ok) score++;
  refreshFeedback();
  document.getElementById('check-btn').disabled=true;
  document.getElementById('score-text').textContent=t(`점수: ${score}`,`Score: ${score}`);
  if(current<totalCount-1){
    document.getElementById('next-btn').style.display='block';
    document.getElementById('next-btn').textContent=t('다음 문제 →','Next Question →');
  } else {
    setTimeout(()=>saveAndShowResult(),600);
  }
  playSound(ok);
};

function refreshFeedback(){
  const q=questions[current];
  const fb=document.getElementById('feedback-box');
  fb.style.display='block';
  fb.className=`feedback-box ${lastAnswerOk?'correct-fb':'wrong-fb'}`;
  // 정답 오답 메시지
  if(q.type==='ox'){
    const ans=q.answer==='O'?t('"맞다" (O)','True (O)'):t('"틀리다" (X)','False (X)');
    document.getElementById('feedback-result').textContent=lastAnswerOk
      ?t('✅ 정답입니다!','✅ Correct!')
      :t(`❌ 오답! 정답은 ${ans} 입니다.`,`❌ Wrong! The answer is ${ans}.`);
  } else {
    const opts=lang==='ko'?q.options_ko:q.options_en;
    document.getElementById('feedback-result').textContent=lastAnswerOk
      ?t('✅ 정답입니다!','✅ Correct!')
      :t(`❌ 오답! 정답: ${String.fromCharCode(65+q.answer)}. ${opts[q.answer]}`,
         `❌ Wrong! Answer: ${String.fromCharCode(65+q.answer)}. ${opts[q.answer]}`);
  }
  document.getElementById('feedback-explanation').textContent=`📖 ${lang==='ko'?q.exko:q.exen}`;
  document.getElementById('check-btn').textContent=t('정답 확인','Check Answer');
  document.getElementById('next-btn').textContent=t('다음 문제 →','Next Question →');

  // 선택지 텍스트 재렌더(언어 전환 대응)
  if(!answered) return;
  if(q.type==='ox'){
    document.querySelectorAll('.ox-btn').forEach(btn=>{
      btn.innerHTML=`${btn.dataset.val}<span>${btn.dataset.val==='O'?t('맞다','True'):t('틀리다','False')}</span>`;
    });
  } else {
    const opts=lang==='ko'?q.options_ko:q.options_en;
    document.querySelectorAll('.mc-btn').forEach((btn,i)=>{
      btn.innerHTML=`<span class="mc-btn-num">${String.fromCharCode(65+i)}</span>${opts[i]}`;
    });
  }
}

let audioCtx=null;
let bgmNodes=[]; let bgmSessionId=0;

function getACtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('touchstart',function ia(){getACtx();document.removeEventListener('touchstart',ia);},{once:true});
document.addEventListener('click',function ia(){getACtx();document.removeEventListener('click',ia);},{once:true});

function playSound(ok){
  try{
    const ctx=getACtx(); const t0=ctx.currentTime;
    if(ok){
      [[523,0],[659,0.13],[784,0.26],[1047,0.40]].forEach(([f,d])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);o.type='sine';
        o.frequency.setValueAtTime(f,t0+d);
        g.gain.setValueAtTime(0,t0+d);g.gain.linearRampToValueAtTime(0.15,t0+d+0.04);g.gain.exponentialRampToValueAtTime(0.001,t0+d+0.22);
        o.start(t0+d);o.stop(t0+d+0.23);
      });
    } else {
      [[330,0,0.30],[262,0.35,0.30],[220,0.70,0.45]].forEach(([f,d,dur])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);o.type='sine';
        o.frequency.setValueAtTime(f,t0+d);o.frequency.linearRampToValueAtTime(f*0.82,t0+d+dur);
        g.gain.setValueAtTime(0,t0+d);g.gain.linearRampToValueAtTime(0.14,t0+d+0.04);g.gain.exponentialRampToValueAtTime(0.001,t0+d+dur+0.05);
        o.start(t0+d);o.stop(t0+d+dur+0.06);
      });
    }
  }catch(e){}
}

function stopBgm(){bgmSessionId++;bgmNodes.forEach(n=>{try{n.stop();}catch(e){}});bgmNodes=[];}

function playBgm(){
  stopBgm(); const myS=++bgmSessionId;
  try{
    const ctx=getACtx();
    const mel=[[523,0,0.28],[659,0.33,0.28],[784,0.66,0.28],[880,1.0,0.42],[784,1.5,0.20],[659,1.75,0.20],[784,2.0,0.55],[698,2.66,0.28],[784,3.0,0.28],[880,3.33,0.28],[1047,3.66,0.42],[880,4.16,0.20],[784,4.41,0.20],[880,4.66,0.55],[784,5.33,0.20],[698,5.55,0.20],[659,5.77,0.20],[523,6.0,0.55],[659,6.66,0.20],[523,6.88,0.20],[440,7.10,0.20],[523,7.33,0.55]];
    const bas=[[262,0,0.22],[196,0.33,0.22],[196,0.66,0.22],[262,1.0,0.22],[196,1.5,0.22],[196,2.0,0.22],[349,2.66,0.22],[262,3.0,0.22],[262,3.33,0.22],[349,3.66,0.22],[262,4.16,0.22],[262,4.66,0.22],[392,5.33,0.22],[294,5.77,0.22],[262,6.0,0.22],[330,6.66,0.22],[262,7.10,0.22],[262,7.33,0.22]];
    const loop=8.0;
    function sched(){
      if(bgmSessionId!==myS)return;
      const t0=ctx.currentTime+0.05;
      [...mel].forEach(([f,w,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='triangle';o.frequency.setValueAtTime(f,t0+w);g.gain.setValueAtTime(0,t0+w);g.gain.linearRampToValueAtTime(0.07,t0+w+0.03);g.gain.exponentialRampToValueAtTime(0.001,t0+w+d);o.start(t0+w);o.stop(t0+w+d+0.01);bgmNodes.push(o);});
      [...bas].forEach(([f,w,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(f,t0+w);g.gain.setValueAtTime(0,t0+w);g.gain.linearRampToValueAtTime(0.05,t0+w+0.04);g.gain.exponentialRampToValueAtTime(0.001,t0+w+d);o.start(t0+w);o.stop(t0+w+d+0.01);bgmNodes.push(o);});
      setTimeout(()=>{if(bgmSessionId===myS)sched();},(loop-0.3)*1000);
    }
    sched();
  }catch(e){}
}

// 전체 점수 데이터를 가져와 XLSX로 다운로드
window.downloadXlsx=async function(){
  if(typeof XLSX==='undefined'){
    alert(t('엑셀 라이브러리 로드 실패','Excel library failed to load'));
    return;
  }
  const btn1=document.getElementById('result-download-btn');
  const btn2=document.getElementById('hof-download-btn');
  [btn1,btn2].forEach(b=>{if(b){b.disabled=true;}});
  const lblKo='⏳ 다운로드 중...';
  const lblEn='⏳ Downloading...';
  document.getElementById('download-btn-label').textContent=t(lblKo,lblEn);
  document.getElementById('hof-download-btn-label').textContent=t(lblKo,lblEn);

  try{
    // Firebase에서 전체 데이터 가져오기 (점수 내림차순)
    const q2=query(collection(db,'pm_gmp_scores'),orderBy('score','desc'));
    const snap=await getDocs(q2);
    const rows=[];
    snap.forEach(doc=>{
      const d=doc.data();
      let dt='';
      if(d.timestamp&&d.timestamp.toDate){
        dt=d.timestamp.toDate().toLocaleString(lang==='ko'?'ko-KR':'en-US');
      }
      const pct=d.total?Math.round((d.score/d.total)*100):0;
      rows.push({
        rank: rows.length+1,
        name: d.name||'',
        score: d.score||0,
        total: d.total||0,
        percentage: pct,
        datetime: dt
      });
    });

    if(!rows.length){
      alert(t('저장된 기록이 없습니다','No records found'));
      return;
    }

    // 헤더 (언어에 따라)
    const headers=lang==='ko'
      ? [['순위','이름','점수','총문제','정답률(%)','응시 일시']]
      : [['Rank','Name','Score','Total','Percentage(%)','Date']];
    const dataMatrix=rows.map(r=>[r.rank,r.name,r.score,r.total,r.percentage,r.datetime]);
    const finalData=[...headers,...dataMatrix];

    const ws=XLSX.utils.aoa_to_sheet(finalData);
    // 컬럼 너비
    ws['!cols']=[{wch:6},{wch:18},{wch:8},{wch:8},{wch:12},{wch:22}];

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, lang==='ko'?'GMP 퀴즈 결과':'GMP Quiz Results');

    const today=new Date().toISOString().slice(0,10);
    const fname=`PM_GMP_Quiz_Results_${today}.xlsx`;
    XLSX.writeFile(wb, fname);
  }catch(err){
    console.error('XLSX export error:',err);
    alert(t('엑셀 다운로드 실패: '+err.message,'Excel download failed: '+err.message));
  }finally{
    [btn1,btn2].forEach(b=>{if(b){b.disabled=false;}});
    document.getElementById('download-btn-label').textContent=t('전체 결과 엑셀 다운로드','Download All Results (XLSX)');
    document.getElementById('hof-download-btn-label').textContent=t('전체 결과 엑셀 다운로드','Download All Results (XLSX)');
  }
};

// ── SAVE & RESULT ──────────────────────────────────────────────────
async function saveAndShowResult(){
  document.getElementById('saving-overlay').classList.add('show');
  try{await addDoc(collection(db,'pm_gmp_scores'),{name:playerName,score,total:totalCount,timestamp:serverTimestamp()});}
  catch(e){console.error(e);}
  document.getElementById('saving-overlay').classList.remove('show');
  await showResult();
  // 결과 표시 후 이메일 전송 (백그라운드)
  sendResultEmail();
}

async function showResult(){
  showScreen('screen-result');
  playBgm();
  document.getElementById('email-status').textContent='';
  document.getElementById('email-status').className='email-status';
  const pct=score/totalCount;
  let emoji,tko,ten,mko,men;
  if(pct>=0.9){emoji='🏆';tko='GMP 마스터!';ten='GMP Master!';mko='"탁월한 GMP 이해도입니다! 현장의 든든한 수호자네요. 🌟"';men='"Outstanding GMP knowledge! You are a true guardian of the production floor. 🌟"';}
  else if(pct>=0.7){emoji='⭐';tko='우수 수료!';ten='Excellent!';mko='"훌륭한 점수입니다! 조금 더 다듬으면 완벽해질 거예요. 💪"';men='"Great score! A little more practice and you\'ll be perfect. 💪"';}
  else if(pct>=0.5){emoji='📋';tko='기본기 양호';ten='Good Foundation';mko='"기본기는 갖추었습니다. 취약 영역을 복습해 보세요. 📚"';men='"Solid foundation. Please review your weak areas. 📚"';}
  else{emoji='📖';tko='재교육 필요';ten='Retraining Needed';mko='"GMP 교육 자료를 다시 한번 복습하고 재도전해 보세요! 🔄"';men='"Please review the GMP training materials and try again! 🔄"';}

  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=t(tko,ten);
  document.getElementById('final-score').textContent=score;
  document.getElementById('final-total').textContent=t(`/ ${totalCount} 점`,`/ ${totalCount} pts`);
  document.getElementById('stat-correct').textContent=score;
  document.getElementById('stat-wrong').textContent=totalCount-score;
  document.getElementById('result-msg').textContent=t(mko,men);

  const list=document.getElementById('top10-list');
  list.innerHTML='<div class="hof-loading">⏳</div>';
  try{
    const q2=query(collection(db,'pm_gmp_scores'),orderBy('score','desc'),limit(10));
    const snap=await getDocs(q2);
    const rows=[];snap.forEach(doc=>rows.push(doc.data()));
    if(!rows.length){list.innerHTML=`<div class="hof-empty">${t('아직 기록이 없어요 🎯','No records yet 🎯')}</div>`;return;}
    list.innerHTML='';
    const medals=['🥇','🥈','🥉'];
    rows.forEach((r,i)=>{
      const isMe=r.name===playerName&&r.score===score;
      const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const div=document.createElement('div');div.className=`rank-row${isMe?' me':''}`;
      div.innerHTML=`<span class="rank-num ${rc}">${i<3?medals[i]:i+1}</span><span class="rank-name">${r.name}${isMe?t(' (나)',' (Me)'):''}</span><span class="rank-score">${r.score}${t('점','pts')}</span>`;
      list.appendChild(div);
    });
  }catch(e){list.innerHTML=`<div class="hof-empty">${t('랭킹을 불러올 수 없어요','Could not load ranking')}</div>`;}
}

// ── HALL OF FAME ───────────────────────────────────────────────────
function renderHofTable(){
  const content=document.getElementById('hof-content');
  if(!hofRows.length){content.innerHTML=`<div class="hof-empty">${t('아직 기록이 없어요.<br>퀴즈를 완료하면 이름이 올라와요! 🎯','No records yet.<br>Complete a quiz to appear here! 🎯')}</div>`;return;}
  const medals=['🥇','🥈','🥉'];
  let html=`<table class="hof-table"><thead><tr><th>${t('순위','Rank')}</th><th>${t('이름','Name')}</th><th>${t('점수','Score')}</th></tr></thead><tbody>`;
  hofRows.forEach((r,i)=>{html+=`<tr><td class="hof-rank-cell">${i<3?medals[i]:i+1}</td><td>${r.name}</td><td>${r.score}${t('점','pts')}</td></tr>`;});
  html+='</tbody></table>';content.innerHTML=html;
}

window.showHallOfFame=async function(){
  prevScreen=document.querySelector('.screen.active')?.id||'screen-start';
  showScreen('screen-hof');
  stopBgm();
  setLang(lang);
  const content=document.getElementById('hof-content');content.innerHTML='<div class="hof-loading">⏳</div>';
  try{
    const q2=query(collection(db,'pm_gmp_scores'),orderBy('score','desc'),limit(20));
    const snap=await getDocs(q2);
    hofRows=[];snap.forEach(doc=>hofRows.push(doc.data()));
    renderHofTable();
  }catch(e){content.innerHTML=`<div class="hof-empty">${t('데이터를 불러올 수 없어요','Could not load data')}</div>`;}
};

window.goBack=function(){
  stopBgm();

};

};
